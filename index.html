<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok 女装 SKU 风险筛选器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --surface: #ffffff;
      --surface-soft: #f6f8fb;
      --line: #e2e8f0;
      --line-strong: #c5cfdb;
      --text: #111827;
      --muted: #64748b;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --green: #047857;
      --green-bg: #e8f8ef;
      --yellow: #b45309;
      --yellow-bg: #fff7e6;
      --red: #b91c1c;
      --red-bg: #fff1f2;
      --blue: #1d4ed8;
      --blue-bg: #eaf1ff;
      --ink: #0f172a;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background:
        linear-gradient(180deg, #111827 0, #111827 220px, var(--bg) 220px);
      color: var(--text);
      line-height: 1.5;
    }

    button, input, textarea, select { font: inherit; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 20px;
      color: #fff;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.18;
      letter-spacing: 0;
      font-weight: 900;
    }

    .title p {
      margin: 8px 0 0;
      color: #bfccdc;
      font-size: 15px;
      max-width: 780px;
    }

    .rate-panel {
      display: grid;
      gap: 9px;
      align-items: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.46);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
      width: 430px;
      max-width: 100%;
      color: var(--text);
    }

    .rate-box {
      display: grid;
      grid-template-columns: 72px 104px 44px minmax(76px, 1fr);
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .rate-box .rate-meta {
      justify-self: end;
      max-width: 100%;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef6f5;
      color: #0f766e;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rate-box #exchangeRate,
    .rate-box #rmbRate {
      width: 104px;
      min-width: 104px;
      max-width: 104px;
      height: 38px;
      padding: 8px 10px;
      border: 1px solid #d5dde7;
      border-radius: 6px;
      text-align: right;
      background: #f8fafc;
      font-weight: 800;
    }

    .rate-box #exchangeRate::-webkit-outer-spin-button,
    .rate-box #exchangeRate::-webkit-inner-spin-button,
    .rate-box #rmbRate::-webkit-outer-spin-button,
    .rate-box #rmbRate::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .rate-box #exchangeRate,
    .rate-box #rmbRate {
      appearance: textfield;
    }

    .rate-updated {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .rate-updated strong { color: var(--text); }

    .import-panel,
    .profit-panel,
    .toolbar,
    .decision-board,
    .summary {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .import-panel {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .field label,
    .control label {
      font-size: 12px;
      font-weight: 800;
      color: #314155;
    }

    .file-zone {
      min-height: 154px;
      display: grid;
      gap: 12px;
      place-items: center;
      text-align: center;
      padding: 18px;
      border: 1px dashed #94a3b8;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8fafc, #eef6f5);
    }

    .file-zone input {
      width: 100%;
      max-width: 280px;
    }

    .hint,
    .status {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error { color: var(--red); font-weight: 800; }
    .status.ok { color: var(--green); font-weight: 800; }

    textarea {
      width: 100%;
      min-height: 154px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #d5dde7;
      border-radius: 8px;
      background: #fbfdff;
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
      min-height: 40px;
      background: #edf2f7;
      color: #273445;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); }
    .btn.primary { background: linear-gradient(135deg, #0f766e, #14b8a6); color: #fff; }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.secondary { border-color: #d5dde7; background: #fff; }
    .btn.copy { min-height: 32px; padding: 6px 9px; font-size: 12px; background: #fff; border-color: var(--line-strong); }
    .btn.copy.done { border-color: var(--green); color: var(--green); }

    .profit-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .profit-panel .control input,
    .profit-panel .control select {
      width: 100%;
      min-width: 0;
    }

    .export-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #dce5ee;
      border-color: rgba(255, 255, 255, 0.7);
    }

    .metric {
      background: linear-gradient(180deg, #ffffff, #f8fbfd);
      padding: 16px 14px;
      min-height: 88px;
      border-top: 3px solid var(--primary);
    }

    .metric.risk { border-top-color: var(--red); }
    .metric.warn { border-top-color: var(--yellow); }
    .metric.good { border-top-color: var(--green); }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .metric strong {
      font-size: 25px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .decision-board {
      padding: 14px;
      margin-bottom: 16px;
    }

    .decision-board h2 {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.3;
    }

    .decision-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .decision-card {
      min-height: 82px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .decision-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .decision-card strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .decision-card.priority { border-color: rgba(4, 120, 87, 0.35); background: var(--green-bg); }
    .decision-card.review,
    .decision-card.cost { border-color: rgba(180, 83, 9, 0.35); background: var(--yellow-bg); }
    .decision-card.fix,
    .decision-card.weight,
    .decision-card.price { border-color: rgba(29, 78, 216, 0.22); background: var(--blue-bg); }
    .decision-card.stop { border-color: rgba(185, 28, 28, 0.28); background: var(--red-bg); }

    .next-action {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef6f5;
      color: #0f766e;
      font-size: 13px;
      font-weight: 900;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      padding: 14px;
      margin-bottom: 16px;
    }

    .control {
      display: grid;
      gap: 6px;
    }

    select,
    .search-input,
    input[type="number"],
    input[type="text"],
    input[type="search"] {
      height: 38px;
      min-width: 170px;
      padding: 7px 10px;
      border: 1px solid #d5dde7;
      border-radius: 7px;
      background: #fbfdff;
      color: var(--text);
    }

    select:focus,
    textarea:focus,
    input:focus {
      outline: none;
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.14);
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding-bottom: 2px;
    }

    .check-pill {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      min-height: 38px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: #fbfdff;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
    }

    .count-note {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.65);
      text-align: center;
      padding: 24px;
    }

    .product-list {
      display: grid;
      gap: 14px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid rgba(226, 232, 240, 0.92);
      border-left: 6px solid var(--line-strong);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .product-card:hover { box-shadow: 0 22px 52px rgba(15, 23, 42, 0.14); }

    .product-card.level-priority { border-left-color: var(--green); }
    .product-card.level-check { border-left-color: var(--yellow); }
    .product-card.level-caution { border-left-color: #d97706; }
    .product-card.level-stop { border-left-color: var(--red); }

    .card-main {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr) 282px;
      gap: 16px;
      padding: 16px;
    }

    .thumb {
      width: 120px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      object-fit: cover;
      background: #eef2f6;
    }

    .thumb-placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .product-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      color: #0f172a;
    }

    .copy-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 0 0 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid rgba(29, 78, 216, 0.12);
    }

    .tag.priority,
    .tag.green { background: var(--green-bg); color: var(--green); }
    .tag.risk,
    .tag.red,
    .tag.missing { background: var(--red-bg); color: var(--red); }
    .tag.warn,
    .tag.complex,
    .tag.yellow { background: var(--yellow-bg); color: var(--yellow); }

    .alert {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #fda29b;
      background: var(--red-bg);
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }

    .title-quality {
      margin: 0 0 12px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #f8fafc, #f3f7fa);
      font-size: 13px;
      color: #344054;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
    }

    .fact {
      min-height: 56px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8fafc;
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .fact strong {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .side {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .score {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #f8fafc, #eef6f5);
    }

    .score-num {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ccfbf1, #e6fffb);
      color: #115e59;
      font-size: 22px;
      font-weight: 900;
    }

    .score.level-check .score-num { background: var(--yellow-bg); color: var(--yellow); }
    .score.level-caution .score-num { background: #fff7ed; color: #c2410c; }
    .score.level-stop .score-num { background: var(--red-bg); color: var(--red); }

    .score-level { font-weight: 900; }

    .shipping {
      display: grid;
      gap: 4px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfdff;
      font-size: 13px;
    }

    .shipping strong { color: var(--text); }
    .shipping .danger { color: var(--red); font-weight: 900; }

    .advice {
      margin: 0;
      padding-left: 18px;
      color: #384556;
      font-size: 13px;
    }

    .advice li { margin: 3px 0; }

    .card-footer {
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }

    details summary {
      cursor: pointer;
      padding: 12px 16px;
      font-weight: 900;
      color: #263544;
    }

    .sku-wrap {
      overflow-x: auto;
      padding: 0 16px 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #f1f5f9;
      color: #304052;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: 0; }
    .muted { color: var(--muted); }

    @media (max-width: 1120px) {
      .summary { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
      .card-main { grid-template-columns: 100px minmax(0, 1fr); }
      .side { grid-column: 1 / -1; grid-template-columns: 280px minmax(0, 1fr); }
      .thumb { width: 100px; }
    }

    @media (max-width: 760px) {
      .page { padding: 18px 12px 32px; }
      .topbar,
      .import-panel,
      .profit-panel,
      .decision-board,
      .card-main,
      .side { grid-template-columns: 1fr; }
      .rate-panel { width: 100%; min-width: 0; box-shadow: none; }
      .rate-box { grid-template-columns: 64px 104px 40px; }
      .rate-box .rate-meta { grid-column: 1 / -1; justify-self: start; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .decision-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .facts { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .thumb { width: 96px; }
      .count-note { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="title">
        <h1>TikTok 女装 SKU 风险筛选器</h1>
        <p>批量解析 CSV，识别重量、价格、尺寸、信息缺失和利润风险，辅助快速决定优先测试 / 暂缓上架。</p>
      </div>
      <div class="rate-panel" aria-label="汇率设置">
        <label class="rate-box">
          <span>1 USD =</span>
          <input id="exchangeRate" type="number" min="0" step="0.01" value="4.7">
          <span>MYR</span>
          <span class="rate-meta" id="usdRateMode">自动汇率</span>
        </label>
        <label class="rate-box">
          <span>1 RMB =</span>
          <input id="rmbRate" type="number" min="0" step="0.01" value="0.65">
          <span>MYR</span>
          <span class="rate-meta" id="rmbRateMode">自动汇率</span>
        </label>
        <div class="rate-updated">
          <span>最后更新时间</span>
          <strong id="rateUpdatedAt">-</strong>
        </div>
      </div>
    </section>

    <section class="import-panel">
      <div class="field">
        <label for="csvFile">上传 CSV / XLSX 文件</label>
        <div class="file-zone">
          <input id="csvFile" type="file" accept=".csv,.xlsx,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
          <p class="hint">CSV 优先支持 UTF-8，并会尝试识别 GBK / GB18030；TikTok 批量编辑 .xlsx 会自动跳过说明行。如果仍乱码，请另存为 CSV UTF-8 再上传。</p>
        </div>
      </div>
      <div class="field">
        <label for="csvText">粘贴 CSV 文本</label>
        <textarea id="csvText" placeholder="把 TikTok 商品 CSV 内容粘贴到这里"></textarea>
      </div>
      <div class="actions">
        <button class="btn primary" id="parseBtn" type="button">解析 CSV</button>
        <button class="btn secondary" id="clearBtn" type="button">清空</button>
        <span class="status" id="status">数据仅在浏览器本地处理，不上传服务器。CSV 解析器已内置，断网也可使用。</span>
      </div>
    </section>

    <section class="profit-panel" aria-label="利润测算参数">
      <div class="control">
        <label for="commissionRate">TikTok 平台佣金比例</label>
        <input id="commissionRate" type="number" min="0" step="0.1" value="6">
      </div>
      <div class="control">
        <label for="paymentRate">支付手续费比例</label>
        <input id="paymentRate" type="number" min="0" step="0.1" value="2">
      </div>
      <div class="control">
        <label for="otherCost">其他成本 MYR</label>
        <input id="otherCost" type="number" min="0" step="0.01" value="0">
      </div>
      <div class="control">
        <label for="targetMargin">目标最低利润率</label>
        <input id="targetMargin" type="number" min="0" step="1" value="30">
      </div>
      <div class="control">
        <label for="costField">采购价字段</label>
        <select id="costField">
          <option value="">导入 CSV 后自动识别</option>
        </select>
      </div>
      <div class="control">
        <label for="shippingRules">超重运费规则 kg:USD</label>
        <input id="shippingRules" type="text" value="0.5:0,1:4.5,1.5:9,2:13.5,2.5:18,3:22.5">
      </div>
      <div class="control">
        <label for="costTableFile">上传 1688 成本表</label>
        <input id="costTableFile" type="file" accept=".csv,.xlsx,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
      </div>
      <div class="export-actions">
        <button class="btn secondary" id="loadCostTableBtn" type="button">读取1688成本表</button>
        <button class="btn secondary" id="export1688TasksBtn" type="button">导出1688抓价清单 CSV</button>
        <button class="btn secondary" id="exportActionListBtn" type="button">导出执行清单 CSV</button>
        <button class="btn secondary" id="exportPriorityBtn" type="button">导出优先测试清单 CSV</button>
        <button class="btn secondary" id="exportTestableBtn" type="button">导出可测试清单 CSV</button>
        <button class="btn secondary" id="exportRiskyBtn" type="button">导出问题商品清单 CSV</button>
      </div>
    </section>

    <section class="summary" id="summary" aria-label="汇总看板"></section>

  </main>

  <script>
    window.Papa = window.Papa || {
      parse(csvText, options = {}) {
        const delimiter = detectDelimiter(csvText);
        const rows = parseDelimitedRows(String(csvText || ''), delimiter);
        const errors = [];
        if (!options.header) return { data: rows, errors, meta: { delimiter } };

        const rawHeaders = rows.shift() || [];
        const headers = rawHeaders.map((header) => {
          const cleaned = stripBom(String(header || '')).trim();
          return options.transformHeader ? options.transformHeader(cleaned) : cleaned;
        });

        const data = rows
          .filter((row) => options.skipEmptyLines !== 'greedy' || row.some((cell) => String(cell || '').trim()))
          .map((row) => {
            const item = {};
            headers.forEach((header, index) => {
              if (!header) return;
              item[header] = row[index] ?? '';
            });
            return item;
          });

        return { data, errors, meta: { delimiter, fields: headers } };
      }
    };

    function detectDelimiter(text) {
      const firstLine = String(text || '').split(/\r?\n/).find((line) => line.trim()) || '';
      const candidates = [',', '\t', ';'];
      return candidates
        .map((delimiter) => ({ delimiter, count: firstLine.split(delimiter).length }))
        .sort((a, b) => b.count - a.count)[0].delimiter;
    }

    function parseDelimitedRows(text, delimiter) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          row.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.length > 1 || row[0].trim()) rows.push(row);
      return rows;
    }

    function stripBom(text) {
      return String(text || '').replace(/^\uFEFF/, '');
    }

    const els = {
      file: document.getElementById('csvFile'),
      text: document.getElementById('csvText'),
      parse: document.getElementById('parseBtn'),
      clear: document.getElementById('clearBtn'),
      status: document.getElementById('status'),
      summary: document.getElementById('summary'),
      decisionBoard: document.getElementById('decisionBoard'),
      list: document.getElementById('productList'),
      rate: document.getElementById('exchangeRate'),
      rmbRate: document.getElementById('rmbRate'),
      usdRateMode: document.getElementById('usdRateMode'),
      rmbRateMode: document.getElementById('rmbRateMode'),
      rateUpdatedAt: document.getElementById('rateUpdatedAt'),
      commissionRate: document.getElementById('commissionRate'),
      paymentRate: document.getElementById('paymentRate'),
      otherCost: document.getElementById('otherCost'),
      targetMargin: document.getElementById('targetMargin'),
      costField: document.getElementById('costField'),
      costTableFile: document.getElementById('costTableFile'),
      loadCostTable: document.getElementById('loadCostTableBtn'),
      shippingRules: document.getElementById('shippingRules'),
      export1688Tasks: document.getElementById('export1688TasksBtn'),
      exportActionList: document.getElementById('exportActionListBtn'),
      exportPriority: document.getElementById('exportPriorityBtn'),
      exportTestable: document.getElementById('exportTestableBtn'),
      exportRisky: document.getElementById('exportRiskyBtn'),
      sort: document.getElementById('sortBy'),
      priority: document.getElementById('onlyPriority'),
      weightRisk: document.getElementById('onlyWeightRisk'),
      missing: document.getElementById('onlyMissing'),
      weightError: document.getElementById('onlyWeightError'),
      abnormal: document.getElementById('onlyAbnormal'),
      fetchCost: document.getElementById('onlyFetchCost'),
      reprice: document.getElementById('onlyReprice'),
      paused: document.getElementById('onlyPaused'),
