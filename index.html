      count: document.getElementById('countNote')
    };

    const state = { rows: [], products: [], headers: [], costRows: [], costMap: new Map() };
    const RATE_CACHE_KEY = 'tiktokSkuRiskRatesV1';
    const DEFAULT_RATES = { usdToMyr: 4.7, rmbToMyr: 0.65, updatedAt: '' };
    const rateState = { usdManual: false, rmbManual: false, source: 'default' };

    const SUMMER_KEYWORDS = ['nipis', 'musim panas', 'pelindung matahari', 'ringan', 'breathable', 'sun protection', 'thin', 'lightweight', 'cooling', '透气', '轻薄', '防晒', '夏季', '凉感'];
    const LIGHT_CLOTHES_KEYWORDS = ['t-shirt', 'baju-t', 'tee', 'nipis', 'ringan', 'thin', '薄', '轻薄', '透气', '短袖'];
    const COMMUTE_KEYWORDS = ['office', 'work', 'kerja', 'formal', 'blouse', 'shirt', 'suit', '通勤', '上班', '衬衫', '西装'];
    const HOME_KEYWORDS = ['home', 'rumah', 'pajama', 'sleepwear', 'loungewear', 'casual', '居家', '睡衣', '家居', '休闲'];
    const LIVE_KEYWORDS = ['set', 'viral', 'new', 'hot', 'slimming', 'plus size', '显瘦', '套装', '爆款', '新款', '遮肉'];
    const VIDEO_KEYWORDS = ['sun protection', 'uv', 'cooling', 'breathable', 'slimming', '显瘦', '防晒', '透气', '凉感', '遮肉'];
    const LOCAL_MARKET_KEYWORDS = ['malaysia', 'my', 'muslimah', 'hijab', 'baju', 'kurung', 'raya', 'musim panas', 'nipis', 'ringan', '马来西亚'];
    const MACHINE_TRANSLATION_PATTERNS = [/women women/i, /fashion female/i, /explosion models/i, /foreign trade/i, /cross-border/i, /女士女/i, /女的/i, /外贸/i, /跨境/i, /爆款款/i];
    const COST_FIELD_KEYWORDS = ['采购价', '成本价', '供货价', '1688价格', '1688 Price', 'Cost', 'Purchase Price', 'Wholesale Price', 'Supplier Price'];

    const fieldNames = {
      categoryId: ['分类id', '分类ID', 'Category ID', 'Category Id', 'category_id', 'category', '类目', 'Category'],
      title: ['产品标题', 'Product Name', 'Product Title', 'Title', 'product_name', '商品名称'],
      description: ['Tiktok产品描述', 'TikTok产品描述', 'Product Description', 'Description', 'product_description', '商品描述'],
      brand: ['品牌', 'brand'],
      sku: ['sku', 'SKU', 'Seller SKU', 'Seller Sku', 'sku_id', 'seller_sku', 'SKU ID', '商家 SKU'],
      variant1: ['变种属性值一', 'variation_value', '销售变体选项', 'Variation'],
      variant2: ['变种属性值二'],
      variant3: ['变种属性值三'],
      price: ['价格(站点币种)', 'Price', 'Original Price', 'price', '零售价（本地币种）'],
      localPrice: ['本地展示价', 'Sale Price', 'Selling Price', 'Display Price'],
      costRmb: ['1688采购价', '采购价RMB', '采购价', '成本价', '1688 Price RMB', 'cost_rmb'],
      stock: ['库存', 'Stock', 'Inventory', 'warehouse_quantity'],
      mainImage: ['主图(url)地址', 'Main Image', 'Main Image URL', 'Image URL', 'main_image', '主图'],
      weight: ['重量(kg)', 'Weight(kg)', 'Weight (kg)', 'Weight(g)', 'Weight (g)', 'Package Weight', 'parcel_weight', '包裹重量(g)'],
      length: ['长', 'Package Length(cm)', 'Length(cm)', 'Length', 'parcel_length', '包裹长度(cm)'],
      width: ['宽', 'Package Width(cm)', 'Width(cm)', 'Width', 'parcel_width', '包裹宽度(cm)'],
      height: ['高', 'Package Height(cm)', 'Height(cm)', 'Height', 'parcel_height', '包裹高度(cm)'],
      warehouse: ['仓库名称'],
      cod: ['货到付款', 'cod'],
      sourceUrl: ['来源Url', '来源URL', '来源url', 'source_url', 'Source URL', '1688 URL', 'Product URL', '1688链接'],
      offerId: ['offerId', 'Offer ID', 'offer ID', 'offer_id'],
      sourceWeight: ['1688重量', '1688重量(g)', 'source_weight', 'source_weight_g'],
      sourceShippingRmb: ['1688运费', '1688国内运费', '国内运费', 'source_shipping_rmb'],
      shopName: ['店铺名'],
      productId: ['产品id', '产品ID', 'Product ID', 'Product Id', 'product_id', '商品 ID', '商品ID'],
      currency: ['店铺币种'],
      publishTime: ['平台刊登时间']
    };

    function getProfitConfig() {
      return {
        exchangeRate: currentUsdToMyrRate(),
        rmbRate: currentRmbToMyrRate(),
        commissionRate: (toNumber(els.commissionRate.value) ?? 6) / 100,
        paymentRate: (toNumber(els.paymentRate.value) ?? 2) / 100,
        otherCost: toNumber(els.otherCost.value) ?? 0,
        targetMargin: (toNumber(els.targetMargin.value) ?? 30) / 100,
        costField: els.costField.value,
        shippingRules: parseShippingRules(els.shippingRules.value)
      };
    }

    function currentUsdToMyrRate() {
      return toNumber(els.rate.value) ?? DEFAULT_RATES.usdToMyr;
    }

    function currentRmbToMyrRate() {
      return toNumber(els.rmbRate.value) ?? DEFAULT_RATES.rmbToMyr;
    }

    function formatDateTime(timestamp) {
      if (!timestamp) return '-';
      const date = new Date(timestamp);
      if (Number.isNaN(date.getTime())) return '-';
      const pad = (num) => String(num).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function readCachedRates() {
      try {
        const cached = JSON.parse(localStorage.getItem(RATE_CACHE_KEY) || 'null');
        if (!cached) return null;
        const usdToMyr = toNumber(cached.usdToMyr);
        const rmbToMyr = toNumber(cached.rmbToMyr);
        if (usdToMyr === null || rmbToMyr === null) return null;
        return { usdToMyr, rmbToMyr, updatedAt: cached.updatedAt || '' };
      } catch (error) {
        return null;
      }
    }

    function cacheRates(rates) {
      try {
        localStorage.setItem(RATE_CACHE_KEY, JSON.stringify(rates));
      } catch (error) {
        return;
      }
    }

    function setRateInputs(rates, source = 'auto') {
      if (!rateState.usdManual) els.rate.value = formatNum(rates.usdToMyr, 4);
      if (!rateState.rmbManual) els.rmbRate.value = formatNum(rates.rmbToMyr, 4);
      rateState.source = source;
      updateRateMeta(rates.updatedAt, source);
      recalculateProducts();
    }

    function updateRateMeta(updatedAt = '', source = rateState.source) {
      els.usdRateMode.textContent = rateState.usdManual ? '手动汇率' : source === 'auto' ? '自动汇率' : source === 'cache' ? '缓存汇率' : '默认汇率';
      els.rmbRateMode.textContent = rateState.rmbManual ? '手动汇率' : source === 'auto' ? '自动汇率' : source === 'cache' ? '缓存汇率' : '默认汇率';
      els.rateUpdatedAt.textContent = formatDateTime(updatedAt);
    }

    async function fetchLatestRates() {
      const response = await fetch('https://open.er-api.com/v6/latest/USD', { cache: 'no-store' });
      if (!response.ok) throw new Error('汇率接口请求失败');
      const data = await response.json();
      const usdToMyr = toNumber(data?.rates?.MYR);
      const cnyRate = toNumber(data?.rates?.CNY);
      if (usdToMyr === null || cnyRate === null || cnyRate <= 0) throw new Error('汇率接口数据不完整');
      return {
        usdToMyr,
        rmbToMyr: usdToMyr / cnyRate,
        updatedAt: data.time_last_update_unix ? new Date(data.time_last_update_unix * 1000).toISOString() : new Date().toISOString()
      };
    }

    async function initExchangeRates() {
      const cached = readCachedRates();
      setRateInputs(cached || DEFAULT_RATES, cached ? 'cache' : 'default');
      try {
        const latest = await fetchLatestRates();
        cacheRates(latest);
        setRateInputs(latest, 'auto');
      } catch (error) {
        updateRateMeta((cached || DEFAULT_RATES).updatedAt, cached ? 'cache' : 'default');
      }
    }

    function parseShippingRules(input) {
      const fallback = [
        { maxKg: 0.5, usd: 0 },
        { maxKg: 1, usd: 4.5 },
        { maxKg: 1.5, usd: 9 },
        { maxKg: 2, usd: 13.5 },
        { maxKg: 2.5, usd: 18 },
        { maxKg: 3, usd: 22.5 }
      ];
      const rules = String(input || '')
        .split(',')
        .map((part) => {
          const [kg, usd] = part.split(':').map((item) => toNumber(item));
          return kg !== null && usd !== null ? { maxKg: kg, usd } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.maxKg - b.maxKg);
      return rules.length ? rules : fallback;
    }

    function chooseDefaultCostField(headers) {
      const lowerHeaders = headers.map((header) => ({ raw: header, lower: String(header).toLowerCase() }));
      for (const keyword of COST_FIELD_KEYWORDS) {
        const lowerKeyword = keyword.toLowerCase();
        const matched = lowerHeaders.find(({ lower }) => lower.includes(lowerKeyword));
        if (matched) return matched.raw;
      }
      return '';
    }

    function populateCostFieldOptions(headers) {
      const current = els.costField.value;
      const defaultField = chooseDefaultCostField(headers);
      const selected = current && headers.includes(current) ? current : defaultField;
      els.costField.innerHTML = '<option value="">不计算采购价</option>' + headers.map((header) => `
        <option value="${escapeHtml(header)}">${escapeHtml(header)}</option>
      `).join('');
      els.costField.value = selected;
    }

    function normalizeHeaderName(name) {
      return String(name || '').trim().toLowerCase();
    }

    function dynamicFieldMatch(header, key) {
      const normalized = normalizeHeaderName(header);
      return key === 'stock' && normalized.startsWith('warehouse_quantity/');
    }

    function findField(row, key) {
      const names = fieldNames[key] || [key];
      const headers = Object.keys(row || {});
      for (const name of names) {
        if (Object.prototype.hasOwnProperty.call(row, name)) return name;
      }
      const normalizedNames = names.map(normalizeHeaderName);
      const caseMatch = headers.find((header) => normalizedNames.includes(normalizeHeaderName(header)));
      if (caseMatch) return caseMatch;
      return headers.find((header) => dynamicFieldMatch(header, key)) || '';
    }

    function value(row, key) {
      const field = findField(row, key);
      return field ? String(row[field] ?? '').trim() : '';
    }

    function fieldNameFor(row, key) {
      return findField(row, key);
    }

    function hasField(row, key) {
      return Boolean(findField(row, key));
    }

    function extractOfferId(url) {
      const text = String(url || '').trim();
      if (!text) return '';
      const offerMatch = text.match(/offer\/(\d+)\.html/i);
      if (offerMatch) return offerMatch[1];
      const idMatch = text.match(/[?&](?:offerId|id)=(\d+)/i);
      if (idMatch) return idMatch[1];
      const longNumber = text.match(/\b\d{10,}\b/);
      return longNumber ? longNumber[0] : '';
    }

    function costMatchKey(url) {
      const offerId = extractOfferId(url);
      return offerId || String(url || '').trim().split(/[?#]/)[0].replace(/\/$/, '');
    }

    function costMatchKeys(rowOrUrl) {
      if (typeof rowOrUrl === 'string') {
        const key = costMatchKey(rowOrUrl);
        return key ? [key] : [];
      }
      const keys = [];
      const sourceUrl = value(rowOrUrl, 'sourceUrl');
      const offerId = value(rowOrUrl, 'offerId') || extractOfferId(sourceUrl);
      if (offerId) keys.push(offerId);
      const urlKey = costMatchKey(sourceUrl);
      if (urlKey) keys.push(urlKey);
      return [...new Set(keys)];
    }

    function numericField(row, key) {
      const field = fieldNameFor(row, key);
      return {
        field,
        raw: field ? String(row[field] ?? '').trim() : '',
        value: field ? toNumber(row[field]) : null
      };
    }

    function normalizeWeight(row) {
      const field = fieldNameFor(row, 'weight');
      return normalizeWeightKg(field ? row[field] : '', field);
    }

    function normalizeSourceWeightKg(row) {
      const field = fieldNameFor(row, 'sourceWeight');
      return normalizeWeightKg(field ? row[field] : '', field || 'source_weight_g');
    }

    function normalizeWeightKg(rawValue, fieldName) {
      const num = toNumber(rawValue);
      if (num === null) return { value: null, suspectedGram: false };
      const field = String(fieldName || '').toLowerCase();
      if (field === 'parcel_weight') return { value: num / 1000, suspectedGram: false };
      if (/\bkg\b|公斤|千克/.test(field)) return { value: num, suspectedGram: false };
      if (/\bg\b|gram|克/.test(field)) return { value: num / 1000, suspectedGram: false };
      if (num > 20) return { value: num / 1000, suspectedGram: true };
      return { value: num, suspectedGram: false };
    }

    function cleanNumberText(input) {
      return String(input ?? '')
        .replace(/\u00A0/g, ' ')
        .replace(/[，]/g, ',')
        .replace(/[－–—]/g, '-')
        .replace(/\s+/g, '')
        .trim();
    }

    function toNumber(input) {
      const text = cleanNumberText(input);
      if (!text || /^[-/\\na|null|undefined]+$/i.test(text)) return null;
      const normalized = text.replace(/,/g, '').replace(/[^\d.-]/g, '');
      const match = normalized.match(/-?\d+(?:\.\d+)?/);
      if (!match) return null;
      const num = Number(match[0]);
      return Number.isFinite(num) ? num : null;
    }

    function cleanPrice(input) {
      const num = toNumber(input);
      if (num === null || num < 0 || num > 100000) return null;
      return num;
    }

    function formatNum(num, digits = 2) {
      if (num === null || num === undefined || !Number.isFinite(num)) return '-';
      if (digits === 0) return String(Math.round(Number(num)));
      return Number(num).toFixed(digits).replace(/\.?0+$/, '');
    }

    function moneyRange(values, currency = '') {
      const nums = values.map(cleanPrice).filter((n) => n !== null);
      if (!nums.length) return '-';
      const min = Math.min(...nums);
      const max = Math.max(...nums);
      const suffix = currency ? ` ${escapeHtml(currency)}` : '';
      if (min === max) return `${formatNum(min)}${suffix}`;
      return `${formatNum(min)} - ${formatNum(max)}${suffix}`;
    }

    function numericRange(values, unit = '') {
      const nums = values.map(toNumber).filter((n) => n !== null);
      if (!nums.length) return '-';
      const min = Math.min(...nums);
      const max = Math.max(...nums);
      if (min === max) return `${formatNum(min, 3)}${unit}`;
      return `${formatNum(min, 3)} - ${formatNum(max, 3)}${unit}`;
    }

    function escapeHtml(input) {
      return String(input ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function hasAnyKeyword(text, keywords) {
      const haystack = String(text || '').toLowerCase();
      return keywords.some((word) => haystack.includes(word.toLowerCase()));
    }

    function extraShippingUsd(weight, rules = parseShippingRules('')) {
      if (weight === null || weight === undefined) return null;
      const matched = rules.find((rule) => weight <= rule.maxKg);
      return matched ? matched.usd : rules[rules.length - 1].usd;
    }

    function scoreLevel(score) {
      if (score >= 80) return '优先测试';
      if (score >= 60) return '可测试但需检查';
      if (score >= 40) return '谨慎上架';
      return '暂缓上架';
    }

    function levelClass(level) {
      if (level === '优先测试') return 'level-priority';
      if (level === '可测试但需检查') return 'level-check';
      if (level === '谨慎上架') return 'level-caution';
      return 'level-stop';
    }

    function tagClass(label) {
      if (label === '优先测试' || label === '利润健康' || label === '适合炎热天气' || label === '适合通勤' || label === '适合居家') return 'green';
      if (label === '重量风险' || label === '信息缺失' || label === '疑似重量填错' || label === '重量异常' || label === '尺寸异常' || label === '价格异常' || label === '可能亏损' || label === '运费吃利润' || label === '利润无法计算') return 'red';
      if (label === 'SKU复杂' || label === '价格偏高' || label === '利润偏低') return 'yellow';
      return '';
    }

    function parseCsvText(csvText) {
      return Papa.parse(csvText, {
        header: true,
        skipEmptyLines: 'greedy',
        transformHeader: (header) => String(header || '').trim()
      });
    }

    function readUint16(bytes, offset) {
      return bytes[offset] | (bytes[offset + 1] << 8);
    }

    function readUint32(bytes, offset) {
      return (bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24)) >>> 0;
    }

    async function inflateRaw(deflatedBytes) {
      if (typeof DecompressionStream === 'undefined') {
        throw new Error('当前浏览器不支持本地解压 .xlsx，请另存为 CSV UTF-8 后上传。');
      }
      const stream = new Blob([deflatedBytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    async function unzipXlsxEntries(buffer) {
      const bytes = new Uint8Array(buffer);
      let eocdOffset = -1;
      for (let i = bytes.length - 22; i >= 0; i -= 1) {
        if (readUint32(bytes, i) === 0x06054b50) {
          eocdOffset = i;
          break;
        }
      }
      if (eocdOffset < 0) throw new Error('无法读取 .xlsx 文件结构，请另存为 CSV UTF-8 后上传。');
      const entryCount = readUint16(bytes, eocdOffset + 10);
      let offset = readUint32(bytes, eocdOffset + 16);
      const decoder = new TextDecoder('utf-8');
      const entries = new Map();

      for (let i = 0; i < entryCount; i += 1) {
        if (readUint32(bytes, offset) !== 0x02014b50) break;
        const method = readUint16(bytes, offset + 10);
        const compressedSize = readUint32(bytes, offset + 20);
        const nameLength = readUint16(bytes, offset + 28);
        const extraLength = readUint16(bytes, offset + 30);
        const commentLength = readUint16(bytes, offset + 32);
        const localOffset = readUint32(bytes, offset + 42);
        const name = decoder.decode(bytes.slice(offset + 46, offset + 46 + nameLength));
        const localNameLength = readUint16(bytes, localOffset + 26);
        const localExtraLength = readUint16(bytes, localOffset + 28);
        const dataStart = localOffset + 30 + localNameLength + localExtraLength;
        const compressed = bytes.slice(dataStart, dataStart + compressedSize);
        let data;
        if (method === 0) {
          data = compressed;
        } else if (method === 8) {
          data = await inflateRaw(compressed);
        } else {
          throw new Error('暂不支持该 .xlsx 压缩格式，请另存为 CSV UTF-8 后上传。');
        }
        entries.set(name, decoder.decode(data));
        offset += 46 + nameLength + extraLength + commentLength;
      }
      return entries;
    }

    function decodeXmlText(text) {
      return String(text || '')
        .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"')
        .replace(/&apos;/g, "'")
        .replace(/&amp;/g, '&');
    }

    function parseSharedStrings(xml) {
      if (!xml) return [];
      return [...xml.matchAll(/<si\b[\s\S]*?<\/si>/g)].map((match) => {
        const parts = [...match[0].matchAll(/<t\b[^>]*>([\s\S]*?)<\/t>/g)].map((part) => decodeXmlText(part[1]));
        return parts.join('');
      });
    }

    function columnIndexFromRef(ref) {
      const letters = String(ref || '').match(/[A-Z]+/i);
      if (!letters) return 0;
      return [...letters[0].toUpperCase()].reduce((sum, char) => sum * 26 + char.charCodeAt(0) - 64, 0) - 1;
    }

    function parseWorksheetRows(xml, sharedStrings) {
      const rows = [];
      for (const rowMatch of xml.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)) {
        const row = [];
        for (const cellMatch of rowMatch[1].matchAll(/<c\b([^>]*)>([\s\S]*?)<\/c>/g)) {
          const attrs = cellMatch[1];
          const body = cellMatch[2];
          const ref = (attrs.match(/\br="([^"]+)"/) || [])[1] || '';
          const type = (attrs.match(/\bt="([^"]+)"/) || [])[1] || '';
          const valueMatch = body.match(/<v>([\s\S]*?)<\/v>/);
          const inlineMatch = body.match(/<t\b[^>]*>([\s\S]*?)<\/t>/);
          let cellValue = valueMatch ? decodeXmlText(valueMatch[1]) : inlineMatch ? decodeXmlText(inlineMatch[1]) : '';
          if (type === 's') cellValue = sharedStrings[Number(cellValue)] || '';
          row[columnIndexFromRef(ref)] = cellValue;
        }
        rows.push(row.map((cell) => String(cell ?? '').trim()));
      }
      return rows;
    }

    async function parseXlsxBuffer(buffer, dataStartIndex = 5) {
      const entries = await unzipXlsxEntries(buffer);
      const sheetXml = entries.get('xl/worksheets/sheet1.xml') || [...entries.entries()].find(([name]) => /^xl\/worksheets\/sheet\d+\.xml$/.test(name))?.[1];
      if (!sheetXml) throw new Error('未找到 .xlsx 工作表，请另存为 CSV UTF-8 后上传。');
      const sharedStrings = parseSharedStrings(entries.get('xl/sharedStrings.xml') || '');
      const tableRows = parseWorksheetRows(sheetXml, sharedStrings);
      const headers = (tableRows[0] || []).map((header) => String(header || '').trim());
      const dataRows = tableRows.slice(dataStartIndex);
      const data = dataRows.map((cells) => {
        const row = {};
        headers.forEach((header, index) => {
          if (header) row[header] = cells[index] || '';
        });
        return row;
      }).filter((row) => Object.values(row).some((cell) => String(cell ?? '').trim()));
      return { data, meta: { fields: headers.filter(Boolean) } };
    }

    function looksLikeEncodingIssue(text) {
      const sample = String(text || '').slice(0, 1500);
      const badCount = (sample.match(/\uFFFD/g) || []).length;
      const mojibakeCount = (sample.match(/[锟斤拷ÃÂ¤åæœ€°]/g) || []).length;
      return badCount >= 2 || mojibakeCount >= 6;
    }

    async function readSelectedFile() {
      const file = els.file.files && els.file.files[0];
      if (!file) return { text: '', encoding: '', result: null };
      const buffer = await file.arrayBuffer();
      const fileName = String(file.name || '').toLowerCase();
      if (fileName.endsWith('.xlsx')) {
        return { text: '', encoding: 'XLSX', result: await parseXlsxBuffer(buffer, 5) };
      }
      const utf8Text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
      if (!looksLikeEncodingIssue(utf8Text)) return { text: utf8Text, encoding: 'UTF-8' };

      for (const encoding of ['gb18030', 'gbk']) {
        try {
          const decoded = new TextDecoder(encoding, { fatal: false }).decode(buffer);
          if (!looksLikeEncodingIssue(decoded)) return { text: decoded, encoding: encoding.toUpperCase() };
        } catch (error) {
          continue;
        }
      }

      return { text: utf8Text, encoding: '可能乱码' };
    }

    async function readTableFile(file) {
      if (!file) return { result: null, text: '', encoding: '' };
      const buffer = await file.arrayBuffer();
      const fileName = String(file.name || '').toLowerCase();
      if (fileName.endsWith('.xlsx')) {
        return { result: await parseXlsxBuffer(buffer, 1), text: '', encoding: 'XLSX' };
      }
      const utf8Text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
      if (!looksLikeEncodingIssue(utf8Text)) return { result: parseCsvText(utf8Text), text: utf8Text, encoding: 'UTF-8' };
      for (const encoding of ['gb18030', 'gbk']) {
        try {
          const decoded = new TextDecoder(encoding, { fatal: false }).decode(buffer);
          if (!looksLikeEncodingIssue(decoded)) return { result: parseCsvText(decoded), text: decoded, encoding: encoding.toUpperCase() };
        } catch (error) {
          continue;
        }
      }
      return { result: parseCsvText(utf8Text), text: utf8Text, encoding: '可能乱码' };
    }

    function buildCostMap(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const sourceUrl = value(row, 'sourceUrl');
        const keys = costMatchKeys(row);
        if (!keys.length) return;
        const costRmb = cleanPrice(value(row, 'costRmb'));
        const sourceWeightInfo = normalizeSourceWeightKg(row);
        const sourceShippingRmb = cleanPrice(value(row, 'sourceShippingRmb'));
        const item = {
          sourceUrl,
          offerId: value(row, 'offerId') || extractOfferId(sourceUrl),
          costRmb,
          sourceWeightKg: sourceWeightInfo.value,
          sourceShippingRmb,
          note: row['备注'] || row['note'] || row['Note'] || ''
        };
        keys.forEach((key) => map.set(key, item));
      });
      return map;
    }

    function findMatchedCost(sourceUrl) {
      const keys = costMatchKeys(sourceUrl);
      for (const key of keys) {
        const matched = state.costMap.get(key);
        if (matched) return matched;
      }
      return null;
    }

    function costTableStats(rows, products) {
      const costKeys = new Set();
      let missingPriceRows = 0;
      let missingWeightRows = 0;

      rows.forEach((row) => {
        const keys = costMatchKeys(row);
        if (cleanPrice(value(row, 'costRmb')) === null) missingPriceRows += 1;
        if (normalizeSourceWeightKg(row).value === null) missingWeightRows += 1;
        keys.forEach((key) => costKeys.add(key));
      });

      const productsWithSource = products.filter((product) => costMatchKey(product.sourceUrl));
      const matchedProducts = productsWithSource.filter((product) => costKeys.has(costMatchKey(product.sourceUrl))).length;

      return {
        totalRows: rows.length,
        matchedProducts,
        unmatchedProducts: Math.max(0, productsWithSource.length - matchedProducts),
        missingPriceRows,
        missingWeightRows
      };
    }

    async function handleCostTableParse() {
      const file = els.costTableFile.files && els.costTableFile.files[0];
      if (!file) {
        els.status.textContent = '请先上传 1688 成本表 / 成本匹配表。';
        els.status.className = 'status error';
        return;
      }
      try {
        const parsed = await readTableFile(file);
        const rows = (parsed.result?.data || []).filter((row) => Object.values(row).some((cell) => String(cell ?? '').trim()));
        state.costRows = rows;
        state.costMap = buildCostMap(rows);
        recalculateProducts();
        const stats = costTableStats(rows, state.products);
        els.status.textContent = `1688 成本表已读取：总行数 ${stats.totalRows}，成功匹配商品数 ${stats.matchedProducts}，未匹配商品数 ${stats.unmatchedProducts}，缺价格行数 ${stats.missingPriceRows}，缺重量行数 ${stats.missingWeightRows}${parsed.encoding ? `，识别编码：${parsed.encoding}` : ''}。`;
        els.status.className = 'status ok';
      } catch (error) {
        els.status.textContent = error.message || '1688 成本表解析失败，请另存为 CSV UTF-8 后上传。';
        els.status.className = 'status error';
      }
    }

    function assessTitle(title, description) {
      const text = `${title || ''} ${description || ''}`;
      const titleText = String(title || '').trim();
      const issues = [];
      const suggestions = [];
      const tooLong = titleText.length > 100 || titleText.split(/\s+/).filter(Boolean).length > 18;
      const machineTranslated = MACHINE_TRANSLATION_PATTERNS.some((pattern) => pattern.test(titleText)) || /[\u4e00-\u9fa5]{12,}/.test(titleText);
      const localFit = hasAnyKeyword(text, LOCAL_MARKET_KEYWORDS) || hasAnyKeyword(text, SUMMER_KEYWORDS);
      const hasSellingPoint = hasAnyKeyword(text, [...SUMMER_KEYWORDS, ...COMMUTE_KEYWORDS, ...HOME_KEYWORDS, ...LIVE_KEYWORDS, ...VIDEO_KEYWORDS]);

      if (tooLong) issues.push('标题过长');
      if (machineTranslated) issues.push('标题明显机翻');
      if (!localFit) issues.push('标题不适合马来西亚市场');
      if (!hasSellingPoint) issues.push('标题缺少卖点');

      if (localFit && hasSellingPoint && !tooLong && !machineTranslated) suggestions.push('适合本地市场');
      if (!localFit || machineTranslated || !hasSellingPoint) suggestions.push('建议本地化');
      if (tooLong) {
        suggestions.push('标题过长，建议压到 80 字以内');
        suggestions.push('保留核心卖点：轻薄 / 防晒 / 显瘦 / 夏季 / 宽松');
        suggestions.push('删除重复堆词和废话词');
      }

      return {
        issues,
        suggestions,
        tooLong,
        machineTranslated,
        localFit,
        hasSellingPoint,
        summary: suggestions.length ? suggestions.join(' / ') : '建议本地化'
      };
    }

    function aggregateRows(rows) {
      const groups = new Map();
      rows.forEach((row, index) => {
        const productId = value(row, 'productId');
        const categoryId = value(row, 'categoryId');
        const title = value(row, 'title');
        const key = productId || `${categoryId}::${title}` || `row-${index}`;

        if (!groups.has(key)) {
          groups.set(key, {
            key,
            rows: [],
            title,
            categoryId,
            productId,
            description: value(row, 'description'),
            mainImage: value(row, 'mainImage'),
            warehouse: value(row, 'warehouse'),
            cod: value(row, 'cod'),
            sourceUrl: value(row, 'sourceUrl'),
            costRmb: value(row, 'costRmb'),
            sourceWeight: value(row, 'sourceWeight'),
            sourceShippingRmb: value(row, 'sourceShippingRmb'),
            shopName: value(row, 'shopName'),
            currency: value(row, 'currency'),
            publishTime: value(row, 'publishTime')
          });
        }

        const product = groups.get(key);
        product.rows.push(row);
        product.title = product.title || title;
        product.categoryId = product.categoryId || categoryId;
        product.productId = product.productId || productId;
        product.description = product.description || value(row, 'description');
        product.mainImage = product.mainImage || value(row, 'mainImage');
        product.warehouse = product.warehouse || value(row, 'warehouse');
        product.cod = product.cod || value(row, 'cod');
        product.sourceUrl = product.sourceUrl || value(row, 'sourceUrl');
        product.costRmbRaw = product.costRmbRaw || value(row, 'costRmb');
        product.sourceWeightRaw = product.sourceWeightRaw || value(row, 'sourceWeight');
        product.sourceShippingRmbRaw = product.sourceShippingRmbRaw || value(row, 'sourceShippingRmb');
        product.shopName = product.shopName || value(row, 'shopName');
        product.currency = product.currency || value(row, 'currency');
        product.publishTime = product.publishTime || value(row, 'publishTime');
      });
      return [...groups.values()].map((product) => {
        const enriched = enrichProduct(product);
        enriched.nextAction = decideNextAction(enriched);
        return enriched;
      });
    }

    function enrichProduct(product) {
      const config = getProfitConfig();
      const prices = product.rows.map((row) => value(row, 'price'));
      const localPrices = product.rows.map((row) => value(row, 'localPrice'));
      const stocks = product.rows.map((row) => toNumber(value(row, 'stock')) || 0);
      const weightInfos = product.rows.map((row) => normalizeWeight(row));
      let weightValues = weightInfos.map((info) => info.value);
      const suspectedGramWeight = weightInfos.some((info) => info.suspectedGram);
      const lengthValues = product.rows.map((row) => numericField(row, 'length').value);
      const widthValues = product.rows.map((row) => numericField(row, 'width').value);
      const heightValues = product.rows.map((row) => numericField(row, 'height').value);
      const matchedCost = findMatchedCost(product.sourceUrl);
      const sourceWeightValues = product.rows.map((row) => normalizeSourceWeightKg(row).value).filter((n) => n !== null);
      const sourceWeightKg = sourceWeightValues.length ? Math.max(...sourceWeightValues) : matchedCost ? matchedCost.sourceWeightKg : null;
      if (!weightValues.some((n) => n !== null) && sourceWeightKg !== null) {
        weightValues = product.rows.length ? product.rows.map(() => sourceWeightKg) : [sourceWeightKg];
      }
      const priceNums = prices.map(cleanPrice).filter((n) => n !== null);
      const localPriceNums = localPrices.map(cleanPrice).filter((n) => n !== null);
      const text = `${product.title} ${product.description}`;
      const weight = weightValues.filter((n) => n !== null && n > 0).length ? Math.max(...weightValues.filter((n) => n !== null && n > 0)) : 0;
      const skuCount = product.rows.length;
      const hasMainImage = Boolean(product.mainImage);
      const hasPrice = priceNums.length > 0 || localPriceNums.length > 0;
      const hasWeight = weightValues.some((n) => n !== null);
      const hasSourceField = product.rows.some((row) => hasField(row, 'sourceUrl'));
      const hasSource = Boolean(product.sourceUrl);
      const summerMatch = hasAnyKeyword(text, SUMMER_KEYWORDS);
      const titleQuality = assessTitle(product.title, product.description);
      const weightAnomaly = weightValues.some((n) => n === null || n <= 0);
      const dimensionAnomaly = [lengthValues, widthValues, heightValues].some((list) => list.some((n) => n === null || n <= 0));
      const priceAnomaly = product.rows.some((row) => {
        const raw = value(row, 'price');
        return raw && cleanPrice(raw) === null;
      });
      const suspectedWeightError = hasAnyKeyword(text, LIGHT_CLOTHES_KEYWORDS) && weight > 0 && weight >= 0.8;
      const missingInfo = !hasMainImage || !hasPrice || !hasWeight || (hasSourceField && !hasSource);
      const minPrice = localPriceNums.length ? Math.min(...localPriceNums) : priceNums.length ? Math.min(...priceNums) : null;
      const maxPrice = localPriceNums.length ? Math.max(...localPriceNums) : priceNums.length ? Math.max(...priceNums) : null;
      const highPrice = maxPrice !== null && maxPrice > 100;
      const shippingUsd = extraShippingUsd(weight, config.shippingRules);
      const shippingMyr = shippingUsd === null ? null : shippingUsd * config.exchangeRate;
      const salePriceNums = localPriceNums.length ? localPriceNums : priceNums;
      const salePrice = salePriceNums.length ? Math.min(...salePriceNums) : null;
      const salePriceRange = localPriceNums.length ? moneyRange(localPrices, product.currency || 'MYR') : moneyRange(prices, product.currency || 'MYR');
      const rowCostRmbValues = product.rows.map((row) => cleanPrice(value(row, 'costRmb'))).filter((n) => n !== null);
      const matchedCostRmb = matchedCost && matchedCost.costRmb !== null ? matchedCost.costRmb : null;
      const costRmb = rowCostRmbValues.length ? Math.min(...rowCostRmbValues) : matchedCostRmb;
      const sourceShippingRmbValues = product.rows.map((row) => cleanPrice(value(row, 'sourceShippingRmb'))).filter((n) => n !== null);
      const sourceShippingRmb = sourceShippingRmbValues.length ? Math.min(...sourceShippingRmbValues) : matchedCost ? matchedCost.sourceShippingRmb : null;
      const totalCostRmb = costRmb !== null ? costRmb + (sourceShippingRmb || 0) : null;
      const costMyrFromRmb = totalCostRmb !== null ? totalCostRmb * config.rmbRate : null;
      const costValues = config.costField ? product.rows.map((row) => cleanPrice(row[config.costField])).filter((n) => n !== null) : [];
      const costPrice = costMyrFromRmb !== null ? costMyrFromRmb : costValues.length ? Math.min(...costValues) : null;
      const costSource = costMyrFromRmb !== null ? '1688 RMB' : costPrice !== null ? 'MYR字段' : '';
      const profitCanCalculate = salePrice !== null && costPrice !== null;
      const platformFee = salePrice !== null ? salePrice * config.commissionRate : null;
      const paymentFee = salePrice !== null ? salePrice * config.paymentRate : null;
      const estimatedProfit = profitCanCalculate ? salePrice - costPrice - platformFee - paymentFee - (shippingMyr || 0) - config.otherCost : null;
      const profitMargin = estimatedProfit !== null && salePrice > 0 ? estimatedProfit / salePrice : null;
      const profitStatus = estimatedProfit === null
        ? '利润无法计算'
        : estimatedProfit < 0
          ? '可能亏损'
          : profitMargin >= config.targetMargin
            ? '利润健康'
            : '利润偏低';
      const profitHealthy = profitStatus === '利润健康';
      const profitLow = profitStatus === '利润偏低';
      const profitLoss = profitStatus === '可能亏损';
      const profitUnknown = profitStatus === '利润无法计算';
      const freightEatsProfit = shippingMyr !== null && shippingMyr > 0 && estimatedProfit !== null && estimatedProfit > 0 && shippingMyr > estimatedProfit;
      const shippingProfitRisk = weight !== null && weight > 0.5 && minPrice !== null && minPrice < 35;
      const tags = [];
      const mainImageMissing = !hasMainImage;
      const sourceMissing = hasSourceField && !hasSource;
      const priceMissing = !hasPrice;
      const costMissing = costPrice === null;
      const skuTooMany = skuCount > 8;
      const overweight = !weightAnomaly && weight > 0.5;
      const hardRisk = profitLoss || profitLow || weightAnomaly || suspectedWeightError || dimensionAnomaly || priceAnomaly || mainImageMissing || sourceMissing || priceMissing || costMissing || skuTooMany || freightEatsProfit;
      const softOptimization = titleQuality.issues.length > 0 || suspectedGramWeight || highPrice || shippingProfitRisk || overweight;
      const hasAnyAbnormal = hardRisk;

      if (weightAnomaly) tags.push('重量异常');
      if (suspectedGramWeight) tags.push('疑似克重');
      if (dimensionAnomaly) tags.push('尺寸异常');
      if (priceAnomaly) tags.push('价格异常');
      if (overweight) tags.push('重量风险');
      if (suspectedWeightError) tags.push('疑似重量填错');
      if (skuTooMany) tags.push('SKU复杂');
      if (missingInfo) tags.push('信息缺失');
      if (highPrice) tags.push('价格偏高');
      if (profitHealthy) tags.push('利润健康');
      if (profitLoss) tags.push('可能亏损');
      if (profitLow) tags.push('利润偏低');
      if (profitUnknown) tags.push('利润无法计算');
      if (freightEatsProfit) tags.push('运费吃利润');
      if (summerMatch) tags.push('适合炎热天气');
      if (hasAnyKeyword(text, COMMUTE_KEYWORDS)) tags.push('适合通勤');
      if (hasAnyKeyword(text, HOME_KEYWORDS)) tags.push('适合居家');
      if (minPrice !== null && minPrice <= 25 && weight > 0 && weight <= 0.5) tags.push('适合引流款');
      if (hasAnyKeyword(text, LIVE_KEYWORDS) || skuCount <= 4) tags.push('适合直播口播');
      if (hasAnyKeyword(text, VIDEO_KEYWORDS) || suspectedWeightError || summerMatch) tags.push('适合短视频开场');

      let score = 60;
      if (weight > 0 && weight <= 0.5 && !weightAnomaly && !dimensionAnomaly && !priceAnomaly) score += 15;
      if (skuCount <= 6) score += 10;
      if (hasMainImage) score += 5;
      if (hasSource) score += 5;
      if (summerMatch) score += 5;
      if (overweight) score -= 20;
      if (suspectedWeightError) score -= 15;
      if (skuCount > 8) score -= 10;
      if (missingInfo) score -= 20;
      if (titleQuality.tooLong) score -= 2;
      if (titleQuality.machineTranslated) score -= 2;
      if (!titleQuality.localFit) score -= 2;
      if (!titleQuality.hasSellingPoint) score -= 2;
      if (highPrice) score -= 5;
      if (weightAnomaly) score -= 20;
      if (dimensionAnomaly) score -= 15;
      if (priceAnomaly) score -= 15;
      if (profitHealthy && !weightAnomaly && weight <= 0.5 && !missingInfo) score += 12;
      if (profitLow) score -= 12;
      if (profitLoss) score -= 30;
      if (profitUnknown) score -= 10;
      if (freightEatsProfit) score -= 15;
      score = Math.max(0, Math.min(100, score));

      const stockTotal = stocks.reduce((sum, n) => sum + n, 0);
      let level = scoreLevel(score);
      if (!hardRisk && profitHealthy && weight > 0 && weight <= 0.5 && skuCount <= 8) {
        level = '优先测试';
      } else if (hasAnyAbnormal) {
        level = score >= 60 ? '可测试但需检查' : '暂缓上架';
      }
      if (weightAnomaly) {
        level = score >= 60 ? '可测试但需检查' : '暂缓上架';
      }
      if (profitLoss || (estimatedProfit !== null && estimatedProfit < 0)) {
        level = '暂缓上架';
      }

      return {
        ...product,
        skuCount,
        prices,
        localPrices,
        priceRange: moneyRange(prices, product.currency),
        localPriceRange: moneyRange(localPrices, product.currency),
        salePrice,
        salePriceRange,
        costPrice,
        costRmb,
        totalCostRmb,
        costMyr: costPrice,
        costSource,
        matchedCost,
        sourceWeightKg,
        sourceShippingRmb,
        platformFee,
        paymentFee,
        estimatedProfit,
        profitMargin,
        profitStatus,
        profitHealthy,
        profitLow,
        profitLoss,
        profitUnknown,
        freightEatsProfit,
        minPrice,
        maxPrice,
        highPrice,
        stockTotal,
        weight,
        weightDisplay: numericRange(weightValues, 'kg'),
        sizeDisplay: `${numericRange(product.rows.map((row) => value(row, 'length')), 'cm')} x ${numericRange(product.rows.map((row) => value(row, 'width')), 'cm')} x ${numericRange(product.rows.map((row) => value(row, 'height')), 'cm')}`,
        tags: [...new Set(tags)],
        score,
        level,
        shippingUsd,
        shippingMyr,
        summerMatch,
        titleQuality,
        suspectedWeightError,
        weightAnomaly,
        suspectedGramWeight,
        hardRisk,
        softOptimization,
        mainImageMissing,
        sourceMissing,
        priceMissing,
        costMissing,
        skuTooMany,
        overweight,
        dimensionAnomaly,
        priceAnomaly,
        shippingProfitRisk,
        missingInfo,
        abnormal: hasAnyAbnormal,
        hasMainImage,
        hasPrice,
        hasWeight,
        hasSource
      };
    }

    function handlingAdvice(product) {
      if (product.profitLoss) return '预估利润为负，不建议上架，除非用于引流或重新定价。';
      if (product.profitUnknown && product.salePrice !== null && product.costPrice === null) return '采购价缺失，利润无法计算。';
      if (product.profitUnknown && product.salePrice === null) return '售价缺失，利润无法计算。';
      if (product.profitUnknown) return '采购价缺失，利润无法计算。';
      if (product.missingInfo) return '主图或来源链接缺失，暂缓上架，先补齐素材。';
      if (product.dimensionAnomaly) return '尺寸为 0 或异常值，需补齐真实尺寸后再上架。';
      if (product.weightAnomaly) return '重量为 0 或异常值，需补齐真实重量后再判断运费。';
      if (product.freightEatsProfit) return '额外运费大于预估利润，需重新定价或降低采购成本。';
      if (product.weight > 0.5) return '重量超过 0.5kg，需确认实际重量，否则运费可能吃掉利润。';
      if (product.profitLow) return '利润偏低，建议对比竞品价格后再测试。';
      if (product.profitHealthy && product.weight <= 0.5 && !product.missingInfo) return '利润健康，重量低，适合优先测试。';
      return '可测试但需补充核价、素材和利润复核。';
    }

    // Decision pipeline: turn SKU, cost, logistics, and content checks into operator actions.
    function decideNextAction(product) {
      if (product.profitLoss || (product.estimatedProfit !== null && product.estimatedProfit < 0)) return '暂缓上架';
      if (product.sourceUrl && product.costPrice === null) return '待抓1688成本';
      if (product.mainImageMissing || product.priceMissing || product.sourceMissing) return '补资料';
      if (product.weightAnomaly || product.dimensionAnomaly || product.suspectedWeightError) return '复核重量尺寸';
      if (product.profitLow || product.freightEatsProfit) return '调价/砍成本';
      if (product.level === '优先测试') return '优先测试';
      if (product.level === '可测试但需检查') return '可测复核';
      return '暂缓上架';
    }

    function displayNextAction(action) {
      return action === '待抓1688成本' ? '抓1688成本' : action || '';
    }

    function suggestedMinSalePrice(product) {
      const config = getProfitConfig();
      const targetMargin = config.targetMargin;
      if (product.costPrice === null || product.platformFee === null || product.paymentFee === null) return null;
      const denominator = 1 - config.commissionRate - config.paymentRate - targetMargin;
      if (denominator <= 0) return null;
      const fixedCost = product.costPrice + (product.shippingMyr || 0) + config.otherCost;
      return fixedCost / denominator;
    }

    function productDetailPackage(product) {
      const skuList = product.rows.map((row) => value(row, 'sku')).filter(Boolean).join(', ');
      const suggestedPrice = suggestedMinSalePrice(product);
      return [
        `产品标题：${product.title || '-'}`,
        `SKU：${skuList || '-'}`,
        `来源Url：${product.sourceUrl || '-'}`,
        `采购价：${product.costRmb === null ? '-' : `${formatNum(product.costRmb)} RMB`} / ${product.costMyr === null ? '-' : `${formatNum(product.costMyr)} MYR`}`,
        `售价：${product.salePrice === null ? '-' : `${formatNum(product.salePrice)} MYR`}`,
        `利润率：${product.profitMargin === null ? '-' : `${formatNum(product.profitMargin * 100)}%`}`,
        `下一步动作：${displayNextAction(product.nextAction) || '-'}`,
        `处理建议：${handlingAdvice(product)}`,
        `建议最低售价：${suggestedPrice === null ? '-' : `${formatNum(suggestedPrice)} MYR`}`
      ].join('\n');
    }

    function buildDecisionPipeline(products) {
      const actions = ['优先测试', '可测复核', '待抓1688成本', '补资料', '复核重量尺寸', '调价/砍成本', '暂缓上架'];
      return actions.map((action) => ({
        action,
        count: products.filter((product) => product.nextAction === action).length
      }));
    }

    function decisionClass(action) {
      if (action === '优先测试') return 'priority';
      if (action === '可测复核') return 'review';
      if (action === '待抓1688成本') return 'cost';
      if (action === '补资料') return 'fix';
      if (action === '复核重量尺寸') return 'weight';
      if (action === '调价/砍成本') return 'price';
      return 'stop';
    }

    function renderDecisionBoard(products) {
      const pipeline = buildDecisionPipeline(products);
      els.decisionBoard.innerHTML = `
        <h2>选品决策台</h2>
        <div class="decision-grid">
          ${pipeline.map((item) => `
            <div class="decision-card ${decisionClass(item.action)}">
              <span>${escapeHtml(item.action)}</span>
              <strong>${formatNum(item.count, 0)}</strong>
            </div>
          `).join('')}
        </div>
      `;
    }

    function checklist(product) {
      const items = [];
      if (product.weightAnomaly) {
        items.push('重量为 0 或异常值，需补齐真实重量。');
      } else if (product.weight === null) {
        items.push('重量为空，需补齐重量后再判断运费。');
      } else if (product.suspectedWeightError) {
        items.push('核实实际重量，T-shirt、轻薄、透气类商品通常不应达到 0.8kg 以上。');
      } else {
        items.push(product.weight > 0.5 ? '重量超过 0.5kg，需确认利润是否覆盖额外运费。' : '重量在 0.5kg 内，运费风险较低。');
      }
      if (product.dimensionAnomaly) {
        items.push('尺寸为 0 或异常值，需补齐真实尺寸。');
      }
      items.push(product.shippingUsd && product.shippingUsd > 0 ? `运费会增加 ${formatNum(product.shippingUsd)} USD。` : '暂无额外超重运费。');
      if (product.shippingProfitRisk) items.push('利润可能被额外运费吃掉。');
      if (product.profitUnknown && product.salePrice !== null && product.costPrice === null) items.push('采购价缺失，利润无法计算。');
      if (product.profitUnknown && product.salePrice === null) items.push('售价缺失，利润无法计算。');
      if (product.profitLoss) items.push('预估利润为负，不建议上架，除非用于引流或重新定价。');
      if (product.profitLow) items.push('利润率低于目标最低利润率，需重新核价。');
      if (product.freightEatsProfit) items.push('额外运费 MYR 大于预估利润，运费吃利润。');
      if (product.profitHealthy) items.push('利润健康，适合进入优先测试池。');
      items.push(product.skuCount > 8 ? 'SKU 过多，建议先精简颜色/尺码测试。' : 'SKU 数量可控。');
      items.push(product.hasMainImage ? '主图已填写，检查附图和尺码图是否完整。' : '主图缺失，需补图。');
      if (product.priceAnomaly) items.push('存在无法解析的价格，请检查 SKU 明细。');
      items.push(product.hasPrice ? '价格已填写，需复核售价、佣金和利润。' : '价格缺失，需补价。');
      if (product.highPrice) items.push('价格偏高，需确认 TikTok 转化和竞品价格。');
      items.push(product.stockTotal > 0 ? `库存合计 ${formatNum(product.stockTotal, 0)} 件。` : '库存为 0 或缺失，需确认可售库存。');
      items.push(product.hasSource ? '来源链接已存在。' : '来源链接缺失，后续补货和核价不方便。');
      items.push(product.cod ? `货到付款：${product.cod}。` : '货到付款信息缺失，需确认店铺策略。');
      items.push(product.titleQuality.summary);
      items.push(product.tags.includes('适合短视频开场') ? '适合 TikTok 短视频开场。' : '短视频开场卖点不够明确。');
      items.push(product.tags.includes('适合直播口播') ? '适合直播间口播。' : '直播口播点较弱，可补充显瘦、面料、场景卖点。');
      items.push(product.tags.includes('适合炎热天气') ? '适合马来西亚炎热天气。' : '未明显体现轻薄、透气、防晒等热带卖点。');
      items.push(product.minPrice !== null && product.minPrice <= 25 ? '适合做低价测试款。' : '低价测试款属性不明显。');
      items.push(product.tags.includes('适合引流款') ? '适合做引流款。' : '做引流款前需确认售价和运费空间。');
      return items;
    }

    function renderSummary(products, rows) {
      const weights = products.map((p) => p.weight).filter((n) => n !== null);
      const prices = products.map((p) => p.minPrice).filter((n) => n !== null);
      const margins = products.map((p) => p.profitMargin).filter((n) => n !== null && Number.isFinite(n));
      const data = [
        ['产品数', products.length, ''],
        ['SKU 总数', rows.length, ''],
        ['优先测试', products.filter((p) => p.level === '优先测试').length, 'good'],
        ['利润健康产品数', products.filter((p) => p.profitHealthy).length, 'good'],
        ['利润偏低产品数', products.filter((p) => p.profitLow).length, 'warn'],
        ['可能亏损产品数', products.filter((p) => p.profitLoss).length, 'risk'],
        ['重量风险', products.filter((p) => p.tags.includes('重量风险')).length, 'risk'],
        ['疑似重量填错', products.filter((p) => p.suspectedWeightError).length, 'risk'],
        ['重量异常', products.filter((p) => p.weightAnomaly).length, 'risk'],
        ['尺寸异常', products.filter((p) => p.dimensionAnomaly).length, 'risk'],
        ['价格异常', products.filter((p) => p.priceAnomaly).length, 'risk'],
        ['信息缺失', products.filter((p) => p.missingInfo).length, 'warn'],
        ['平均预估利润率', margins.length ? `${formatNum((margins.reduce((a, b) => a + b, 0) / margins.length) * 100)}%` : '-', ''],
        ['平均重量', weights.length ? `${formatNum(weights.reduce((a, b) => a + b, 0) / weights.length, 3)}kg` : '-', ''],
        ['平均价格', prices.length ? `${formatNum(prices.reduce((a, b) => a + b, 0) / prices.length)} MYR` : '-', '']
      ];

      els.summary.innerHTML = data.map(([label, val, cls]) => `
        <div class="metric ${cls}">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(val)}</strong>
        </div>
      `).join('');
    }

    function filteredProducts() {
      const query = els.search.value.trim().toLowerCase();
      const filtered = state.products.filter((product) => {
        if (els.priority.checked && product.level !== '优先测试') return false;
        if (els.weightRisk.checked && !product.tags.includes('重量风险')) return false;
        if (els.missing.checked && !product.missingInfo) return false;
        if (els.weightError.checked && !product.suspectedWeightError) return false;
        if (els.abnormal.checked && !product.abnormal) return false;
        if (els.fetchCost.checked && product.nextAction !== '待抓1688成本') return false;
        if (els.reprice.checked && product.nextAction !== '调价/砍成本') return false;
        if (els.paused.checked && product.nextAction !== '暂缓上架') return false;
        if (!query) return true;
        const skuText = product.rows.map((row) => value(row, 'sku')).join(' ');
        const searchable = `${product.title} ${product.productId} ${product.categoryId} ${skuText}`.toLowerCase();
        return searchable.includes(query);
      });

      filtered.sort((a, b) => {
        if (els.sort.value === 'weight') return (b.weight ?? -1) - (a.weight ?? -1);
        if (els.sort.value === 'price') return (b.minPrice ?? -1) - (a.minPrice ?? -1);
        return b.score - a.score;
      });
      return filtered;
    }

    function renderProducts() {
      const products = filteredProducts();
      els.count.textContent = state.products.length ? `显示 ${products.length} / ${state.products.length} 个产品` : '未导入数据';
      if (!state.products.length) {
        els.list.innerHTML = `
          <div class="empty">
            <div>
              <strong>等待导入 CSV</strong>
              <p class="hint">上传文件或粘贴 CSV 文本后点击解析。</p>
            </div>
          </div>`;
        return;
      }
      if (!products.length) {
        els.list.innerHTML = '<div class="empty">当前筛选条件下没有产品。</div>';
        return;
      }
      const rate = currentUsdToMyrRate();
      els.list.innerHTML = products.map((product) => renderProductCard(product, rate)).join('');
    }

    function renderProductCard(product, rate) {
      const image = product.mainImage
        ? `<img class="thumb" src="${escapeHtml(product.mainImage)}" alt="${escapeHtml(product.title || '商品主图')}" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className: 'thumb thumb-placeholder', textContent: '图片无法加载'}))">`
        : '<div class="thumb thumb-placeholder">无主图</div>';
      const tags = product.tags.length
        ? product.tags.map((tag) => `<span class="tag ${tagClass(tag)}">${escapeHtml(tag)}</span>`).join('')
        : '<span class="tag">未标记</span>';
      const shippingMyr = product.shippingMyr;
      const source = product.sourceUrl
        ? `<a href="${escapeHtml(product.sourceUrl)}" target="_blank" rel="noopener noreferrer">打开链接</a>`
        : '-';
      const skuList = product.rows.map((row) => value(row, 'sku')).filter(Boolean).join('\n');
      const cardClass = levelClass(product.level);
      const levelName = cardClass.replace('level-', '');
      const advice = handlingAdvice(product);
      const suggestedPrice = suggestedMinSalePrice(product);
      const alert = product.profitLoss
        ? '<div class="alert">可能亏损：预估利润为负，不建议上架，除非用于引流或重新定价。</div>'
        : product.freightEatsProfit
          ? '<div class="alert">运费吃利润：额外运费 MYR 大于预估利润。</div>'
          : product.suspectedWeightError
        ? '<div class="alert">疑似重量填错：轻薄/T-shirt 类商品重量偏高，请优先核实实际重量。</div>'
        : product.weightAnomaly
          ? '<div class="alert">重量异常：重量为 0 或异常值，需补齐真实重量。</div>'
          : product.dimensionAnomaly
            ? '<div class="alert">尺寸异常：尺寸为 0 或异常值，需补齐真实尺寸。</div>'
            : product.priceAnomaly
              ? '<div class="alert">价格异常：存在无法解析的价格，请检查 SKU 明细。</div>'
        : product.shippingProfitRisk
          ? '<div class="alert">利润可能被额外运费吃掉：该产品超过 0.5kg 且售价偏低。</div>'
          : '';

      return `
        <article class="product-card ${cardClass}">
          <div class="card-main">
            ${image}
            <div>
              <h2 class="product-title">${escapeHtml(product.title || '未命名产品')}</h2>
              <div class="copy-row">
                ${copyButton('复制标题', product.title)}
                ${copyButton('复制 SKU', skuList)}
                ${copyButton('复制来源链接', product.sourceUrl)}
                ${copyButton('复制价格', product.localPriceRange !== '-' ? product.localPriceRange : product.priceRange)}
                ${copyButton('复制重量', product.weight === null ? '' : `${formatNum(product.weight, 3)}kg`)}
                ${copyButton('复制详情包', productDetailPackage(product))}
              </div>
              <div class="tags">${tags}</div>
              ${alert}
              <div class="title-quality">
                处理建议：<strong>${escapeHtml(advice)}</strong>
              </div>
              <div class="title-quality">
                下一步动作：<span class="next-action">${escapeHtml(displayNextAction(product.nextAction) || '-')}</span>
              </div>
              <div class="title-quality">
                标题质量：<strong>${escapeHtml(product.titleQuality.summary)}</strong>
                ${product.titleQuality.issues.length ? `；问题：${escapeHtml(product.titleQuality.issues.join('、'))}` : ''}
              </div>
              <div class="facts">
                ${fact('推荐等级', product.level)}
                ${fact('下一步动作', `<span class="next-action">${escapeHtml(displayNextAction(product.nextAction) || '-')}</span>`, true)}
                ${fact('利润状态', product.profitStatus)}
                ${fact('预估利润', product.estimatedProfit === null ? '-' : `${formatNum(product.estimatedProfit)} MYR`)}
                ${fact('预估利润率', product.profitMargin === null ? '-' : `${formatNum(product.profitMargin * 100)}%`)}
                ${fact('建议最低售价', suggestedPrice === null ? '-' : `${formatNum(suggestedPrice)} MYR`)}
                ${fact('1688采购价', product.costRmb === null ? '-' : `${formatNum(product.costRmb)} RMB`)}
                ${fact('折算采购成本', product.costMyr === null ? '-' : `${formatNum(product.costMyr)} MYR`)}
                ${fact('1688国内运费', product.sourceShippingRmb === null ? '-' : `${formatNum(product.sourceShippingRmb)} RMB`)}
                ${fact('1688重量', product.sourceWeightKg === null ? '-' : `${formatNum(product.sourceWeightKg, 3)}kg`)}
                ${fact('额外运费 MYR', product.shippingMyr === null ? '-' : `${formatNum(product.shippingMyr)} MYR`)}
                ${fact('分类id', product.categoryId || '-')}
                ${fact('产品id', product.productId || '-')}
                ${fact('SKU 数', `${product.skuCount} 个`)}
                ${fact('价格区间', product.priceRange)}
                ${fact('本地展示价', product.localPriceRange)}
                ${fact('库存总数', `${formatNum(product.stockTotal, 0)} 件`)}
                ${fact('重量', product.weightDisplay)}
                ${fact('尺寸 长x宽x高', product.sizeDisplay)}
                ${fact('仓库名称', product.warehouse || '-')}
                ${fact('货到付款', product.cod || '-')}
                ${fact('店铺名', product.shopName || '-')}
                ${fact('店铺币种', product.currency || '-')}
                ${fact('来源Url / 1688', source, true)}
                ${fact('平台刊登时间', product.publishTime || '-')}
              </div>
            </div>
            <aside class="side">
              <div class="score ${cardClass}">
                <div class="score-num">${product.score}</div>
                <div>
                  <div class="score-level">${escapeHtml(product.level)}</div>
                  <div class="muted">推荐优先级</div>
                </div>
              </div>
              <div class="shipping">
                <div>利润状态：<strong>${escapeHtml(product.profitStatus)}</strong></div>
                <div>1688采购价：<strong>${product.costRmb === null ? '-' : `${formatNum(product.costRmb)} RMB`}</strong></div>
                <div>折算采购成本：<strong>${product.costMyr === null ? '-' : `${formatNum(product.costMyr)} MYR`}</strong></div>
                <div>1688重量：<strong>${product.sourceWeightKg === null ? '-' : `${formatNum(product.sourceWeightKg, 3)}kg`}</strong></div>
                <div>预估利润：<strong>${product.estimatedProfit === null ? '-' : `${formatNum(product.estimatedProfit)} MYR`}</strong></div>
                <div>预估利润率：<strong>${product.profitMargin === null ? '-' : `${formatNum(product.profitMargin * 100)}%`}</strong></div>
                <div>调价建议：<strong>${suggestedPrice === null ? '-' : `${formatNum(suggestedPrice)} MYR`}</strong></div>
                <div>额外运费 USD：<strong>${product.shippingUsd === null ? '-' : `${formatNum(product.shippingUsd)} USD`}</strong></div>
                <div>额外运费 MYR：<strong>${shippingMyr === null ? '-' : `${formatNum(shippingMyr)} MYR`}</strong></div>
                <div>是否超过 0.5kg：<strong>${product.weight === null ? '-' : product.weight > 0.5 ? '是' : '否'}</strong></div>
                ${product.shippingProfitRisk || product.freightEatsProfit ? '<div class="danger">利润可能被额外运费吃掉</div>' : ''}
              </div>
              <ul class="advice">${checklist(product).slice(0, 6).map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
            </aside>
          </div>
          <div class="card-footer">
            <details>
              <summary>SKU 明细与完整检查清单</summary>
              <div class="sku-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>sku</th>
                      <th>变种属性值一</th>
                      <th>变种属性值二</th>
                      <th>变种属性值三</th>
                      <th>价格</th>
                      <th>本地展示价</th>
                      <th>库存</th>
                      <th>重量</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${product.rows.map((row) => `
                      <tr>
                        <td>${escapeHtml(value(row, 'sku') || '-')}</td>
                        <td>${escapeHtml(value(row, 'variant1') || '-')}</td>
                        <td>${escapeHtml(value(row, 'variant2') || '-')}</td>
                        <td>${escapeHtml(value(row, 'variant3') || '-')}</td>
                        <td>${escapeHtml(value(row, 'price') || '-')}</td>
                        <td>${escapeHtml(value(row, 'localPrice') || '-')}</td>
                        <td>${escapeHtml(value(row, 'stock') || '-')}</td>
                        <td>${escapeHtml(value(row, 'weight') || '-')}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
                <ul class="advice" style="margin-top: 12px;">
                  ${checklist(product).map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                </ul>
              </div>
            </details>
          </div>
        </article>
      `;
    }

    function copyButton(label, text) {
      return `<button class="btn copy" type="button" data-copy="${escapeHtml(text || '')}">${escapeHtml(label)}</button>`;
    }

    function fact(label, valueText, raw = false) {
      return `
        <div class="fact">
          <span>${escapeHtml(label)}</span>
          <strong>${raw ? valueText : escapeHtml(valueText)}</strong>
        </div>`;
    }

    function csvEscape(valueText) {
      const text = String(valueText ?? '');
      if (/[",\r\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function downloadCsv(filename, headers, rows) {
      const csv = '\uFEFF' + [
        headers.map(csvEscape).join(','),
        ...rows.map((row) => headers.map((header) => csvEscape(row[header])).join(','))
      ].join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function todayString() {
      const date = new Date();
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    async function handleParse() {
      els.status.textContent = '正在读取 CSV / XLSX...';
      els.status.className = 'status';
      try {
        const pasted = els.text.value.trim();
        const fileResult = pasted ? { text: '', encoding: '', result: null } : await readSelectedFile();
        const csvText = pasted || fileResult.text;
        if (!csvText.trim() && !fileResult.result) {
          els.status.textContent = '请先上传 CSV / XLSX 文件或粘贴 CSV 文本。';
          els.status.className = 'status error';
          return;
        }
        if (csvText && looksLikeEncodingIssue(csvText)) {
          els.status.textContent = 'CSV 可能仍存在乱码，请另存为 CSV UTF-8 再上传。';
          els.status.className = 'status error';
        }

        const result = fileResult.result || parseCsvText(csvText);
        const rows = result.data.filter((row) => Object.values(row).some((cell) => String(cell ?? '').trim()));
        state.rows = rows;
        state.headers = result.meta && result.meta.fields && result.meta.fields.length
          ? result.meta.fields
          : Object.keys(rows[0] || {});
        populateCostFieldOptions(state.headers);
        state.products = aggregateRows(rows);
        renderSummary(state.products, state.rows);
        renderDecisionBoard(state.products);
        renderProducts();
        const encodingText = fileResult.encoding ? `，识别编码：${fileResult.encoding}` : '';
        if (!csvText || !looksLikeEncodingIssue(csvText)) {
          els.status.textContent = `解析完成：${state.products.length} 个产品，${state.rows.length} 个 SKU${encodingText}。`;
          els.status.className = 'status ok';
        }
      } catch (error) {
        els.status.textContent = error.message || 'CSV / XLSX 解析失败。请另存为 CSV UTF-8 再上传。';
        els.status.className = 'status error';
      }
    }

    function resetAll() {
      els.file.value = '';
      els.costTableFile.value = '';
      els.text.value = '';
      els.search.value = '';
      els.priority.checked = false;
      els.weightRisk.checked = false;
      els.missing.checked = false;
      els.weightError.checked = false;
      els.abnormal.checked = false;
      els.fetchCost.checked = false;
      els.reprice.checked = false;
      els.paused.checked = false;
      state.rows = [];
      state.products = [];
      state.headers = [];
      state.costRows = [];
      state.costMap = new Map();
      populateCostFieldOptions([]);
      renderSummary([], []);
      renderDecisionBoard([]);
      renderProducts();
      els.status.textContent = '数据仅在浏览器本地处理，不上传服务器。CSV 解析器已内置，断网也可使用。';
      els.status.className = 'status';
    }

    function recalculateProducts() {
      if (!state.rows.length) {
        renderDecisionBoard([]);
        renderProducts();
        return;
      }
      state.products = aggregateRows(state.rows);
      renderSummary(state.products, state.rows);
      renderDecisionBoard(state.products);
      renderProducts();
    }

    async function copyText(text, button) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
      }
      const oldText = button.textContent;
      button.textContent = '已复制';
      button.classList.add('done');
      setTimeout(() => {
        button.textContent = oldText;
        button.classList.remove('done');
      }, 900);
    }

    function init() {
      renderSummary([], []);

      els.parse.addEventListener('click', handleParse);
      els.clear.addEventListener('click', resetAll);

      els.weightRisk.addEventListener('change', renderProducts);
      els.missing.addEventListener('change', renderProducts);
      els.weightError.addEventListener('change', renderProducts);
      els.abnormal.addEventListener('change', renderProducts);
      els.fetchCost.addEventListener('change', renderProducts);
      els.reprice.addEventListener('change', renderProducts);
      els.paused.addEventListener('change', renderProducts);
      els.search.addEventListener('input', renderProducts);
      els.list.addEventListener('click', (event) => {
        const button = event.target.closest('[data-copy]');
        if (!button) return;
        copyText(button.dataset.copy, button);
      });
      initExchangeRates();
    }

    init();
